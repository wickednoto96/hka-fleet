// ── MICRO COMPONENTS ──────────────────────────────────────────────────────────
const Tag=({children,color="default"})=>{
  const m={
    default:[C.surface2,C.muted,C.border],
    amber:[C.amberBg,C.amberText,C.amberBorder],
    green:[C.greenBg,C.greenText,C.greenBorder],
    red:[C.redBg,C.redText,C.redBorder],
    blue:[C.blueBg,C.blueText,C.blueBorder],
    orange:[C.orangeBg,C.orangeText,C.orangeBorder],
  };
  const[bg,txt,bd]=m[color]||m.default;
  return <span style={{display:"inline-block",padding:"2px 8px",borderRadius:20,fontSize:11,
    fontWeight:600,letterSpacing:"0.02em",backgroundColor:bg,color:txt,border:`1px solid ${bd}`}}>{children}</span>;
};

const Row=({label,value,hi})=>(
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",
    padding:"9px 0",borderBottom:`1px solid ${C.border2}`,gap:12}}>
    <span style={{color:C.muted,fontSize:12,flexShrink:0}}>{label}</span>
    <span style={{color:hi?C.amberText:C.text,fontSize:13,textAlign:"right",
      fontWeight:hi?"700":"500"}}>{value}</span>
  </div>
);

const Sec=({title,children})=>(
  <div style={{marginBottom:20}}>
    <div style={{fontSize:10,color:C.muted,letterSpacing:"0.12em",fontWeight:700,textTransform:"uppercase",
      borderBottom:`2px solid ${C.border}`,paddingBottom:6,marginBottom:12}}>{title}</div>
    {children}
  </div>
);

const Card=({children,color})=>{
  const bgs={amber:C.amberBg,red:C.redBg,green:C.greenBg,blue:C.blueBg,orange:C.orangeBg};
  const bds={amber:C.amberBorder,red:C.redBorder,green:C.greenBorder,blue:C.blueBorder,orange:C.orangeBorder};
  const lts={amber:"#f59e0b",red:C.red,green:C.green,blue:C.blue,orange:C.orange};
  return(
    <div style={{marginBottom:8,borderRadius:10,overflow:"hidden",backgroundColor:bgs[color]||C.surface,
      border:`1px solid ${bds[color]||C.border}`,
      borderLeft:`4px solid ${lts[color]||C.border}`}}>
      <div style={{padding:"10px 14px"}}>{children}</div>
    </div>
  );
};

const Pill=({label,value,sub,color})=>{
  const cols={
    amber:[C.amberBg,C.amberText,C.amberBorder],
    blue:[C.blueBg,C.blueText,C.blueBorder],
    green:[C.greenBg,C.greenText,C.greenBorder],
    red:[C.redBg,C.redText,C.redBorder],
  };
  const[bg,txt,bd]=cols[color]||[C.surface,C.text,C.border];
  return(
    <div style={{padding:"12px 14px",backgroundColor:bg,borderRadius:10,border:`1px solid ${bd}`,
      display:"flex",flexDirection:"column",gap:2}}>
      <span style={{fontSize:10,color:C.muted,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase"}}>{label}</span>
      <span style={{fontSize:22,color:txt,fontWeight:800,lineHeight:1}}>{value}</span>
      {sub&&<span style={{fontSize:10,color:C.muted}}>{sub}</span>}
    </div>
  );
};

const NavBtn=({icon,label,active,onClick})=>(
  <button onClick={onClick} style={{flex:1,background:"none",border:"none",
    borderTop:active?`3px solid ${C.navActive}`:"3px solid transparent",
    padding:"8px 4px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,
    backgroundColor:C.nav}}>
    <span style={{fontSize:20}}>{icon}</span>
    <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.06em",
      color:active?C.navActive:C.navText,textTransform:"uppercase"}}>{label}</span>
  </button>
);

function AcGrid({onSel}){
  const[flt,setFlt]=useState("ALL");
  const shown=FLEET.filter(f=>flt==="ALL"||(flt==="A321"?f.model.includes("321"):f.model.includes("320")));
  return(
    <div style={{padding:12}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,padding:"10px 14px",
        backgroundColor:C.amberBg,border:`1px solid ${C.amberBorder}`,borderRadius:10,
        borderLeft:`4px solid ${C.amber}`}}>
        <span style={{fontSize:16}}>⚠️</span>
        <span style={{fontSize:12,color:C.amberText,fontWeight:600}}>ALL AIRCRAFT — Rain repellent deactivated fleet-wide</span>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14,alignItems:"center"}}>
        {["ALL","A320","A321"].map(f=>(
          <button key={f} onClick={()=>setFlt(f)} style={{
            padding:"6px 16px",borderRadius:20,fontSize:12,fontWeight:600,
            border:`1.5px solid ${flt===f?C.blue:C.border}`,
            backgroundColor:flt===f?C.blueBg:"transparent",
            color:flt===f?C.blueText:C.muted}}>
            {f}
          </button>
        ))}
        <span style={{marginLeft:"auto",color:C.dim,fontSize:12,fontWeight:500}}>{shown.length} aircraft</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {shown.map(ac=>(
          <button key={ac.reg} onClick={()=>onSel(ac.reg)} style={{
            background:"none",backgroundColor:C.surface,
            border:`1px solid ${C.border}`,borderRadius:12,
            padding:"14px 12px",cursor:"pointer",textAlign:"left",
            boxShadow:"0 1px 3px rgba(0,0,0,0.06)",
            borderTop: ac.model.includes("321")?`3px solid ${C.blue}`:`3px solid ${C.border}`}}>
            <div style={{fontSize:18,fontWeight:800,color:C.text,marginBottom:2}}>{ac.reg}</div>
            <div style={{fontSize:11,color:C.muted,marginBottom:8,fontWeight:500}}>{ac.model}</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              <Tag color={ac.et==="IAE"?"blue":"green"}>{ac.et}</Tag>
              {ac.wl&&<Tag color="amber">WLGT</Tag>}
              {ac.dual&&<Tag color="orange">2CLS</Tag>}
              {ac.ice!=="Standard"&&<Tag color="red">NO ICE</Tag>}
              {(ac.wifi==="NO"||ac.wifi==="TBC")&&<Tag>NO WIFI</Tag>}
              {ac.reg==="B-LPZ"&&<Tag color="red">TBC</Tag>}
            </div>
            <div style={{marginTop:8,fontSize:12,color:C.muted,fontWeight:500}}>{ac.cfg}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            <Pill label="Min Weight" value={a.wts.min.toLocaleString()} sub="kg" color="green"/>
            <Pill label="Fuel Capacity" value={a.fuel.toLocaleString()} sub="kg" color="amber"/>
          </div>
          <Card>
            <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>LB ↔ KG Conversion</div>
            <div style={{fontSize:13,color:C.text}}>LB → KG  ×  0.453592</div>
            <div style={{fontSize:13,color:C.text,marginTop:4}}>KG → LB  ×  2.204622</div>
          </Card>
        </>}
        {tab===2&&<>
          <Row label="PRM (self-reliant)" value={a.prm} hi/>
          <Row label="Infants Max" value={a.inf===2?"2 (1 CRD + 1 CRS)":a.inf}/>
          <Row label="UM (6–12 yrs)" value={typeof a.um==="number"?`Max ${a.um} — >6 = extra crew`:a.um}/>
          <Row label="YP (12–15 yrs)" value="No limitation"/>
          <Row label="Emerg Lighting" value={a.eL} hi/>
          {a.cO2!=="N/A"&&<Row label="Cabin O2 Duration" value={a.cO2} hi/>}
          <Row label="Additional O2" value={a.o2} hi={a.o2.startsWith("Addl")}/>
          <div style={{marginTop:12}}>
            <Card>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Doors</div>
              <div style={{fontSize:12,color:C.text,lineHeight:1.7}}>{a.doors}</div>
            </Card>
            {is321&&<Card color="orange">
              <div style={{fontSize:11,fontWeight:700,color:C.orangeText,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>A321 — Crew Positioning</div>
              <div style={{fontSize:12,color:C.text,lineHeight:1.7}}>{a.seats}</div>
            </Card>}
          </div>
        </>}
        {tab===3&&<>
          {a.caut.map((c,i)=>{
            const isWarn=c.startsWith("⚠️")||c.includes("INOP")||c.includes("NO AUTOLAND");
            return(
              <div key={i} style={{padding:"10px 14px",marginBottom:8,borderRadius:10,
                backgroundColor:isWarn?C.redBg:C.surface,
                border:`1px solid ${isWarn?C.redBorder:C.border}`,
                borderLeft:`4px solid ${isWarn?C.red:"#cbd5e0"}`,
                fontSize:12,color:isWarn?C.redText:C.text,lineHeight:1.6}}>
                {c}
              </div>
            );
          })}
          <div style={{padding:"10px 14px",borderRadius:10,backgroundColor:C.greenBg,
            border:`1px solid ${C.greenBorder}`,fontSize:12,color:C.greenText,marginTop:4}}>
            ⓘ Always verify TABs in FCOM before flight. Non-official reference only.
          </div>
        </>}
      </div>
    </div>
  );
}

function LimitsPage(){

      <div style={{padding:12}}>
        {sub==="EGT"&&<Sec title="EGT / N1 / N2 Limits"><LimTable rows={EGT}/></Sec>}

        {sub==="START"&&<>
          <Sec title="CFM — Engine Start Rules">
            {START_CFM.map((s,i)=>(
              <Card key={i} color="green">
                <div style={{fontSize:12,color:C.text,lineHeight:1.5}}>

                </div>
              </Card>
            ))}
          </Sec>
          <Sec title="IAE — Engine Start Rules">
            {START_IAE.map((s,i)=>(
              <Card key={i} color="blue">

                  <span style={{color:C.blueText,fontWeight:700}}>IAE  </span>{s}
                </div>
              </Card>
            ))}

        </>}
        {sub==="FLEX"&&<Sec title="Flex Takeoff — TFLEX Limits">
          {[
            {l:"A320 CFM — Max TFLEX",v:"ISA + 53°C",c:"green"},

            {l:"A320 IAE — Max TFLEX",v:"ISA + 71°C",c:"amber"},
            {l:"Min TFLEX",v:"NOT lower than TREF (flat temp)",c:"red"},

            {l:"IAE crosswind start (A321/A320)",v:"Up to 35 kts",c:"orange"},
          ].map((f,i)=>(

        </Sec>}
        {sub==="WIND"&&<>
          <Sec title="Operational Wind Limits — inc. Gusts (Maximum)">
            <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",borderRadius:10,border:`1px solid ${C.border}`}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{backgroundColor:C.surface2}}>
                    {["Condition","A320","A321"].map((h,i)=>(
                      <th key={i} style={{padding:"8px 10px",borderBottom:`1px solid ${C.border}`,
                        textAlign:i===0?"left":"center",fontSize:11,color:C.muted,fontWeight:700}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {WIND.map((r,i)=>(
                    <tr key={i} style={{backgroundColor:i%2===0?C.surface:C.surface2}}>
                      <td style={{padding:"9px 10px",color:C.text,fontSize:11,borderBottom:`1px solid ${C.border2}`}}>{r.c}</td>
                      <td style={{padding:"9px 10px",color:C.amberText,textAlign:"center",fontWeight:700,borderBottom:`1px solid ${C.border2}`}}>{r.a320}</td>
                      <td style={{padding:"9px 10px",color:C.amberText,textAlign:"center",fontWeight:700,borderBottom:`1px solid ${C.border2}`}}>{r.a321}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Sec>
          <Card>
            <div style={{fontSize:11,color:C.muted,lineHeight:1.8}}>
              * Auto rollout 15 kts: B-LPL, B-LPM, B-LPN, B-LPO, B-LPP, B-LPQ<br/>
              ** Auto rollout 20 kts: B-LPC, B-LPD, B-LPE, B-LPI, B-LPJ, B-LPK<br/>
              All limits include gusts.
            </div>
          </Card>
        </>}
        {sub==="REV"&&<Sec title="Reverse Thrust — All Aircraft">
          {[
            {t:"No reversers in flight",c:"red"},
            {t:"Do NOT backup aircraft using reverse thrust",c:"red"},
            {t:"Max reverse — do NOT use below 70 kts",c:"amber"},
            {t:"Idle reverse — permitted down to aircraft stop",c:"green"},
          ].map((r,i)=>(
            <Card key={i} color={r.c}>
              <div style={{fontSize:14,color:C[r.c+"Text"],fontWeight:700}}>{r.t}</div>
            </Card>
          ))}
        </Sec>}
      </div>
    </div>
  );
}

        <div key={i} style={{marginBottom:8,borderRadius:10,overflow:"hidden",

          boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
          <button onClick={()=>setOpen(open===i?null:i)} style={{width:"100%",

            border:"none",padding:"13px 14px",cursor:"pointer",textAlign:"left"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,color:C[g.col+"Text"]||C.amberText,fontWeight:700}}>{g.g}</div>

      <div style={{display:"flex",gap:6,padding:"12px 12px 0",borderBottom:`1px solid ${C.border}`,
        overflowX:"auto",WebkitOverflowScrolling:"touch",backgroundColor:C.surface}}>
        {[["PREG","Pregnant"],["PRM","PRM / UM"],["EQUIP","Equipment"],["PED","PED"]].map(([k,l])=>(
          <button key={k} onClick={()=>setSub(k)} style={{flexShrink:0,padding:"6px 14px",

            backgroundColor:sub===k?C.blueBg:"transparent",
            color:sub===k?C.blueText:C.muted,

              <div style={{fontSize:13,color:p.fly?C.amberText:C.redText,fontWeight:700,marginBottom:4}}>{p.w}</div>

          <button key={k} onClick={()=>setSub(k)} style={{padding:"6px 14px",

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const[page,setPage]=useState("home");
  const[sel,setSel]=useState(null);
  const[vh,setVh]=useState(window.innerHeight);
  useEffect(()=>{
    const upd=()=>setVh(window.innerHeight);
    window.addEventListener("resize",upd);
    return()=>window.removeEventListener("resize",upd);
  },[]);

  const goAc=(reg)=>{setSel(reg);setPage("ac");};
  const goHome=()=>{setSel(null);setPage("home");};

  const HEADER=64, NAV=58, FOOTER=26;
  const scrollH=vh-HEADER-NAV-FOOTER;

  const selAc=sel?FLEET.find(f=>f.reg===sel):null;

  return(
    <div style={{height:vh,backgroundColor:C.bg,color:C.text,maxWidth:480,
      margin:"0 auto",display:"flex",flexDirection:"column",overflow:"hidden"}}>

      {/* HEADER */}
      <div style={{height:HEADER,backgroundColor:C.surface,
        borderBottom:`1px solid ${C.border}`,flexShrink:0,
        display:"flex",alignItems:"center",padding:"0 16px",gap:10,
        boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        {page==="ac"&&(
          <button onClick={goHome} style={{border:`1px solid ${C.border}`,
            backgroundColor:C.surface2,color:C.muted,
            padding:"6px 12px",borderRadius:8,fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>
            ← Back
          </button>
        )}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:10,color:C.dim,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase"}}>Hong Kong Airlines</div>
          <div style={{fontSize:17,color:C.text,fontWeight:800,lineHeight:1.2}}>
            {page==="home"?"Fleet Reference":page==="ac"?sel:page==="limits"?"Limitations":page==="tabs"?"TABs":page==="sep"?"SEP":"Reference"}
          </div>
        </div>
        {page==="ac"&&selAc&&(
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:10,color:C.dim,fontWeight:500}}>MSN {selAc.msn}</div>
            <div style={{fontSize:11,color:C.muted,fontWeight:500}}>{selAc.engine}</div>
          </div>
        )}
      </div>

      {/* SCROLL AREA */}
      <div style={{height:scrollH,overflowY:"auto",WebkitOverflowScrolling:"touch",flexShrink:0}}>
        {page==="home"  &&<AcGrid onSel={goAc}/>}
        {page==="ac"    &&sel&&<AcDetail reg={sel}/>}
        {page==="limits"&&<LimitsPage/>}
        {page==="tabs"  &&<TabsPage/>}
        {page==="sep"   &&<SepPage/>}
        {page==="ref"   &&<RefPage/>}
      </div>

      {/* FOOTER */}
      <div style={{height:FOOTER,display:"flex",alignItems:"center",justifyContent:"center",
        borderTop:`1px solid ${C.border}`,flexShrink:0,backgroundColor:C.surface2}}>
        <div style={{fontSize:9,color:C.dim,fontWeight:500,letterSpacing:"0.06em",textTransform:"uppercase"}}>
          Non-Official · Not for Operational Use · V2.6 May 2026
        </div>
      </div>

      {/* BOTTOM NAV */}
      <div style={{height:NAV,backgroundColor:C.nav,display:"flex",flexShrink:0,
        boxShadow:"0 -2px 8px rgba(0,0,0,0.15)"}}>
        <NavBtn icon="✈️" label="Fleet"  active={page==="home"||page==="ac"} onClick={goHome}/>
        <NavBtn icon="⚙️" label="Limits" active={page==="limits"} onClick={()=>setPage("limits")}/>
        <NavBtn icon="⚠️" label="TABs"   active={page==="tabs"}   onClick={()=>setPage("tabs")}/>
        <NavBtn icon="🆘" label="SEP"    active={page==="sep"}    onClick={()=>setPage("sep")}/>
        <NavBtn icon="📚" label="Ref"    active={page==="ref"}    onClick={()=>setPage("ref")}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
