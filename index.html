const M="'Courier New',monospace";

// ── MICRO COMPONENTS ──────────────────────────────────────────────────────────
const Tag=({children,color="default"})=>{
  const m={default:[C.panel,C.muted,C.border],amber:[C.amberBg,C.amber,C.amberBorder],
    green:[C.greenBg,C.green,C.greenBorder],red:[C.redBg,C.red,C.redBorder],
    blue:[C.blueBg,C.blue,C.blueBorder],orange:[C.orangeBg,C.orange,C.orangeBorder]};
  const[bg,txt,bd]=m[color]||m.default;
  return <span style={{display:"inline-block",padding:"2px 7px",borderRadius:4,fontSize:10,
    fontFamily:M,fontWeight:700,letterSpacing:"0.05em",backgroundColor:bg,color:txt,border:`1px solid ${bd}`}}>{children}</span>;
};
const Row=({label,value,hi})=>(
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",
    padding:"7px 0",borderBottom:`1px solid ${C.border2}`,gap:12}}>
    <span style={{color:C.muted,fontSize:11,fontFamily:M,flexShrink:0}}>{label}</span>
    <span style={{color:hi?C.amber:C.text,fontSize:13,fontFamily:M,textAlign:"right",fontWeight:hi?"700":"400"}}>{value}</span>
  </div>
);
const Sec=({title,children})=>(
  <div style={{marginBottom:16}}>
    <div style={{fontSize:9,color:C.muted,letterSpacing:"0.15em",borderBottom:`1px solid ${C.border}`,paddingBottom:6,marginBottom:10}}>{title}</div>
    {children}
  </div>
);
const Card=({children,color})=>{
  const bgs={amber:C.amberBg,red:C.redBg,green:C.greenBg,blue:C.blueBg,orange:C.orangeBg};
  const bds={amber:C.amberBorder,red:C.redBorder,green:C.greenBorder,blue:C.blueBorder,orange:C.orangeBorder};
  return <div style={{padding:"10px 12px",marginBottom:6,borderRadius:6,
    backgroundColor:bgs[color]||C.panel,border:`1px solid ${bds[color]||C.border}`}}>{children}</div>;
};
const Pill=({label,value,sub,color})=>{
  const colors={amber:[C.amberBg,C.amber],blue:[C.blueBg,C.blue],green:[C.greenBg,C.green],red:[C.redBg,C.red]};
  const[bg,txt]=colors[color]||[C.panel,C.amber];
  return <div style={{padding:"10px 12px",backgroundColor:bg,borderRadius:6,border:`1px solid ${C.border}`,display:"flex",flexDirection:"column"}}>
    <span style={{fontSize:10,color:C.muted,marginBottom:3}}>{label}</span>
    <span style={{fontSize:18,color:txt,fontWeight:700,fontFamily:M,lineHeight:1}}>{value}</span>
    {sub&&<span style={{fontSize:10,color:C.dim,marginTop:3}}>{sub}</span>}
  </div>;
};
const NavBtn=({icon,label,active,onClick})=>(
  <button onClick={onClick} style={{flex:1,background:"none",border:"none",
    borderTop:active?`2px solid ${C.amber}`:"2px solid transparent",
    padding:"8px 4px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
    <span style={{fontSize:18}}>{icon}</span>
    <span style={{fontSize:9,fontFamily:M,color:active?C.amber:C.muted,letterSpacing:"0.05em"}}>{label}</span>
  </button>
);

        </>}
        {tab===2&&<>
          <Row label="PRM (self-reliant)" value={a.prm} hi/>
          <Row label="INFANTS MAX" value={a.inf===2?"2 (1 CRD + 1 CRS)":a.inf}/>
          <Row label="UM (6–12 yrs)" value={typeof a.um==="number"?`Max ${a.um} — >6 = extra crew`:a.um}/>
          <Row label="YP (12–15 yrs)" value="No limitation"/>
          <Row label="EMERG LIGHTING" value={a.eL} hi/>
          {a.cO2!=="N/A"&&<Row label="CABIN O2 DURATION" value={a.cO2} hi/>}
          <Row label="ADDITIONAL O2" value={a.o2} hi={a.o2.startsWith("Addl")}/>
          <Card>
            <div style={{fontSize:10,color:C.muted,marginBottom:8}}>DOORS</div>
            <div style={{fontSize:12,color:"#8899bb",lineHeight:1.6}}>{a.doors}</div>
          </Card>
          {is321&&<Card color="orange">
            <div style={{fontSize:10,color:C.orange,marginBottom:4}}>A321 — CREW POSITIONING</div>
            <div style={{fontSize:12,color:"#cc8844",lineHeight:1.6}}>{a.seats}</div>
          </Card>}
        </>}
        {tab===3&&<>
          {a.caut.map((c,i)=>(
            <div key={i} style={{padding:"10px 12px",marginBottom:6,borderRadius:6,
              backgroundColor:c.startsWith("⚠️")||c.includes("INOP")||c.includes("NO AUTOLAND")?C.redBg:C.panel,
              border:`1px solid ${c.startsWith("⚠️")||c.includes("INOP")||c.includes("NO AUTOLAND")?C.redBorder:C.border}`,
              fontSize:12,color:c.startsWith("⚠️")||c.includes("INOP")||c.includes("NO AUTOLAND")?"#ff6644":"#8899bb",lineHeight:1.5,fontFamily:M}}>
              {c}
            </div>
          ))}
          <Card color="green"><div style={{fontSize:11,color:C.green}}>ⓘ Verify all TABs in FCOM before flight. Non-official reference only.</div></Card>
        </>}
      </div>
    </div>
  );
}

function LimitsPage(){
  const[sub,setSub]=useState("EGT");
  return(
    <div>
      <div style={{display:"flex",overflowX:"auto",gap:4,padding:"12px 12px 0",borderBottom:`1px solid ${C.border}`,WebkitOverflowScrolling:"touch"}}>
        {["EGT","OIL","START","FLEX","WIND","REV"].map(s=>(
          <button key={s} onClick={()=>setSub(s)} style={{flexShrink:0,padding:"6px 12px",border:`1px solid ${sub===s?C.amber:C.border}`,backgroundColor:sub===s?C.amberBg:"transparent",color:sub===s?C.amber:C.muted,borderRadius:4,fontSize:10,fontFamily:M,cursor:"pointer"}}>{s}</button>
        ))}
      </div>
      <div style={{padding:12}}>
        {sub==="EGT"&&<Sec title="EGT / N1 / N2 LIMITS"><LimTable rows={EGT}/></Sec>}
        {sub==="OIL"&&<Sec title="OIL LIMITS"><LimTable rows={OIL}/></Sec>}
        {sub==="START"&&<>
          <Sec title="CFM — ENGINE START">{START_CFM.map((s,i)=><Card key={i}><span style={{color:C.green,fontWeight:700}}>CFM </span><span style={{fontSize:12,color:"#8899bb"}}>{s}</span></Card>)}</Sec>
          <Sec title="IAE — ENGINE START">{START_IAE.map((s,i)=><Card key={i}><span style={{color:C.blue,fontWeight:700}}>IAE </span><span style={{fontSize:12,color:"#8899bb"}}>{s}</span></Card>)}</Sec>
        </>}
        {sub==="FLEX"&&<Sec title="FLEX TAKEOFF — TFLEX LIMITS">
          {[{l:"A320 CFM — Max TFLEX",v:"ISA + 53°C",c:"green"},{l:"A321 IAE — Max TFLEX",v:"ISA + 42°C",c:"blue"},{l:"A320 IAE — Max TFLEX",v:"ISA + 71°C",c:"amber"},{l:"Min TFLEX",v:"NOT lower than TREF (flat temp)",c:"red"},{l:"Min TFLEX",v:"NOT lower than actual OAT",c:"red"},{l:"IAE crosswind start (A321/A320)",v:"Up to 35 kts",c:"amber"}].map((f,i)=>(
            <Card key={i} color={f.c}>
              <div style={{fontSize:10,color:C.muted,marginBottom:3}}>{f.l}</div>
              <div style={{fontSize:14,color:C[f.c]||C.amber,fontWeight:700,fontFamily:M}}>{f.v}</div>
            </Card>
          ))}
          <Card><div style={{fontSize:11,color:C.muted}}>See FCTM PR-NP-SOP-120 for tailstrike avoidance guidance.</div></Card>
        </Sec>}
        {sub==="WIND"&&<>
          <Sec title="OPERATIONAL WIND LIMITS — inc. GUSTS (Maximum)">
            <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:M}}>
                <thead><tr>{["CONDITION","A320","A321"].map((h,i)=><th key={i} style={{padding:"6px 8px",borderBottom:`1px solid ${C.border}`,color:C.muted,textAlign:i===0?"left":"center",fontSize:10}}>{h}</th>)}</tr></thead>
                <tbody>{WIND.map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.border2}`}}><td style={{padding:"7px 8px",color:C.muted,fontSize:10}}>{r.c}</td><td style={{padding:"7px 8px",color:C.amber,textAlign:"center",fontWeight:700}}>{r.a320}</td><td style={{padding:"7px 8px",color:C.amber,textAlign:"center",fontWeight:700}}>{r.a321}</td></tr>)}</tbody>
              </table>
            </div>
          </Sec>
          <Card>
            <div style={{fontSize:10,color:C.muted,lineHeight:1.8}}>
              * Auto rollout 15 kts: B-LPL, B-LPM, B-LPN, B-LPO, B-LPP, B-LPQ<br/>
              ** Auto rollout 20 kts: B-LPC, B-LPD, B-LPE, B-LPI, B-LPJ, B-LPK<br/>
              All limits include gusts.
            </div>
          </Card>
        </>}
        {sub==="REV"&&<Sec title="REVERSE THRUST — ALL AIRCRAFT">
          {[{t:"No reversers in flight",c:"red"},{t:"Do NOT backup aircraft using reverse thrust",c:"red"},{t:"Max reverse — do NOT use below 70 kts",c:"amber"},{t:"Idle reverse — permitted down to aircraft stop",c:"green"}].map((r,i)=>(
            <Card key={i} color={r.c}><div style={{fontSize:13,color:C[r.c],fontFamily:M,fontWeight:700}}>{r.t}</div></Card>
          ))}
        </Sec>}
      </div>
    </div>
  );
}

function TabsPage(){
  const[open,setOpen]=useState(null);
  return(
    <div style={{padding:12}}>
      <Card color="red"><div style={{fontSize:11,color:C.red}}>⚠️ Temporary Abnormal Behaviors (FCOM TAB). Always verify DSC references in FCOM before flight.</div></Card>
      {TABS_DATA.map((g,i)=>(
        <div key={i} style={{marginBottom:8,borderRadius:6,overflow:"hidden",border:`1px solid ${C[g.col+"Border"]||C.border}`}}>
          <button onClick={()=>setOpen(open===i?null:i)} style={{width:"100%",background:"none",backgroundColor:open===i?(C[g.col+"Bg"]||C.panel):C.panel,border:"none",padding:"12px",cursor:"pointer",textAlign:"left"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,color:C[g.col]||C.amber,fontFamily:M,fontWeight:700}}>{g.g}</div>
                <div style={{fontSize:10,color:C.muted,marginTop:3,lineHeight:1.4}}>{g.regs}</div>
              </div>
              <div style={{color:C.muted,fontSize:14,flexShrink:0,marginLeft:8}}>{open===i?"▲":"▼"}</div>
            </div>
          </button>
          {open===i&&(
            <div style={{padding:"0 12px 12px",backgroundColor:C[g.col+"Bg"]||C.panel}}>
              {g.items.map((item,j)=>(
                <div key={j} style={{padding:"7px 0",borderBottom:`1px solid ${C.border2}`,fontSize:11,color:"#8899bb",lineHeight:1.5,fontFamily:M}}>{item}</div>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function SepPage(){
  const[sub,setSub]=useState("PREG");
  return(
    <div>
      <div style={{display:"flex",gap:4,padding:"12px 12px 0",borderBottom:`1px solid ${C.border}`,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        {[["PREG","Pregnant"],["PRM","PRM / UM"],["EQUIP","Equipment"],["PED","PED"]].map(([k,l])=>(
          <button key={k} onClick={()=>setSub(k)} style={{flexShrink:0,padding:"6px 10px",border:`1px solid ${sub===k?C.amber:C.border}`,backgroundColor:sub===k?C.amberBg:"transparent",color:sub===k?C.amber:C.muted,borderRadius:4,fontSize:10,fontFamily:M,cursor:"pointer"}}>{l}</button>
        ))}
      </div>
      <div style={{padding:12}}>
        {sub==="PREG"&&<Sec title="PREGNANT PASSENGER POLICY (ref. OM-E)">
          {PREG.map((p,i)=>(
            <Card key={i} color={p.fly?"default":"red"}>
              <div style={{fontSize:12,color:p.fly?C.amber:C.red,fontWeight:700,marginBottom:4,fontFamily:M}}>{p.w}</div>
              <div style={{fontSize:11,color:"#8899bb",lineHeight:1.5}}>{p.req}</div>
            </Card>
          ))}
        </Sec>}
        {sub==="PRM"&&<Sec title="PRM / UM / YP LIMITS">
          {[
            {l:"PRM (self-reliant) — A320",v:"4 per flight"},
            {l:"PRM (self-reliant) — A321",v:"8 per flight"},
            {l:"UM (6–12 yrs) — A320 & A321",v:"Max 10. If >6 UMs, extra crew required."},
            {l:"YP (12–15 yrs)",v:"No limitation"},
            {l:"Infants — A320",v:"Max 2 (1 with CRD + 1 with CRS)"},
            {l:"Infants — A321",v:"Max 15"},
          ].map((r,i)=><Row key={i} label={r.l} value={r.v} hi={r.l.includes("PRM")}/>)}
        </Sec>}
        {sub==="EQUIP"&&<Sec title="COCKPIT EMERGENCY EQUIPMENT — SERVICEABILITY">
          {EQUIP.map((eq,i)=>(
            <Card key={i}>
              <div style={{fontSize:12,color:C.amber,fontWeight:700,marginBottom:8,fontFamily:M}}>{eq.n}</div>
              {eq.ck.map((c,j)=><div key={j} style={{display:"flex",gap:8,marginBottom:4}}>
                <span style={{color:C.green,flexShrink:0}}>✓</span>
                <span style={{fontSize:11,color:"#8899bb",lineHeight:1.5}}>{c}</span>
              </div>)}
            </Card>
          ))}
        </Sec>}
        {sub==="PED"&&<Sec title="PORTABLE ELECTRONIC DEVICES (PED)">
          {[{t:"U-PEDs",f:"Unintentionally Transmitting PEDs",c:"amber"},{t:"T-PEDs",f:"Intentionally Transmitting PEDs",c:"red"},{t:"C-PEDs",f:"Controlled Portable Devices",c:"green"}].map((p,i)=>(
            <Card key={i} color={p.c}>
              <div style={{fontSize:14,color:C[p.c],fontWeight:700,fontFamily:M}}>{p.t}</div>
              <div style={{fontSize:11,color:"#8899bb",marginTop:4}}>{p.f}</div>
            </Card>
          ))}
          <Card><div style={{fontSize:11,color:C.muted,lineHeight:1.7}}>Refer to OM-A and FCOM for approved PED usage restrictions on the flight deck and in the cabin.</div></Card>
        </Sec>}
      </div>
    </div>
  );
}

function RefPage(){
  const[sub,setSub]=useState("DOCS");
  return(
    <div>
      <div style={{display:"flex",gap:4,padding:"12px 12px 0",borderBottom:`1px solid ${C.border}`}}>
        {[["DOCS","Doc Structure"],["TERM","Terminology"]].map(([k,l])=>(
          <button key={k} onClick={()=>setSub(k)} style={{padding:"6px 10px",border:`1px solid ${sub===k?C.amber:C.border}`,backgroundColor:sub===k?C.amberBg:"transparent",color:sub===k?C.amber:C.muted,borderRadius:4,fontSize:10,fontFamily:M,cursor:"pointer"}}>{l}</button>
        ))}
      </div>
      <div style={{padding:12}}>
        {sub==="DOCS"&&<>
          {DOCS.map((d,i)=>(
            <Card key={i} color={d.col}>
              <div style={{fontSize:14,color:C[d.col],fontWeight:700,fontFamily:M,marginBottom:8}}>{d.d}</div>
              {d.items.map((item,j)=><div key={j} style={{display:"flex",gap:8,marginBottom:4}}>
                <span style={{color:C[d.col],flexShrink:0}}>—</span>
                <span style={{fontSize:11,color:"#8899bb",lineHeight:1.5}}>{item}</span>
              </div>)}
            </Card>
          ))}
          <Card>
            <div style={{fontSize:10,color:C.muted,lineHeight:1.8}}>
              <div style={{color:C.amber,fontWeight:700,marginBottom:4}}>ABBREVIATIONS</div>
              <div><span style={{color:C.amber}}>DU</span> — Documentary Unit (technical content)</div>
              <div><span style={{color:C.amber}}>LEDU</span> — List of Effective Documentary Unit</div>
              <div><span style={{color:C.amber}}>TDU</span> — Temporary Documentary Unit</div>
            </div>
          </Card>
        </>}
        {sub==="TERM"&&<Sec title="TERMINOLOGY & DEFINITIONS">
          {TERMS.map((t,i)=>(
            <Card key={i} color={t.col}>
              <div style={{fontSize:13,color:C[t.col]||C.amber,fontWeight:700,fontFamily:M,marginBottom:6}}>{t.t}</div>
              <div style={{fontSize:11,color:"#8899bb",lineHeight:1.5}}>{t.def}</div>
            </Card>
          ))}
        </Sec>}
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const[page,setPage]=useState("home");
  const[sel,setSel]=useState(null);
  const[vh,setVh]=useState(window.innerHeight);

  useEffect(()=>{
    const update=()=>setVh(window.innerHeight);
    window.addEventListener("resize",update);
    return()=>window.removeEventListener("resize",update);
  },[]);

  const goAc=(reg)=>{setSel(reg);setPage("ac");};
  const goHome=()=>{setSel(null);setPage("home");};

  const titles={home:"FLEET",ac:sel||"",limits:"LIMITS",tabs:"TABS",sep:"SEP",ref:"REFERENCE"};
  const subs={home:"Aircraft Reference",ac:sel?FLEET.find(f=>f.reg===sel)?.model:"",limits:"Engine · Oil · Start · Flex · Wind · Rev",tabs:"Temporary Abnormal Behaviors",sep:"Passengers · Equipment",ref:"Documents · Terminology"};

  const HEADER_H=68;
  const NAV_H=62;
  const FOOTER_H=28;
  const scrollH=vh-HEADER_H-NAV_H-FOOTER_H;

  return(
    <div style={{height:vh,backgroundColor:C.bg,color:C.text,fontFamily:M,maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* HEADER */}
      <div style={{height:HEADER_H,backgroundColor:C.bg,borderBottom:`1px solid ${C.border}`,flexShrink:0,display:"flex",alignItems:"center",padding:"0 16px",gap:10}}>
        {page==="ac"&&<button onClick={goHome} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"6px 10px",borderRadius:4,cursor:"pointer",fontSize:12,whiteSpace:"nowrap"}}>← BACK</button>}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:9,color:C.dim,letterSpacing:"0.15em"}}>HONG KONG AIRLINES</div>
          <div style={{fontSize:15,color:C.amber,fontWeight:700,letterSpacing:"0.1em"}}>{titles[page]}</div>
          <div style={{fontSize:10,color:C.dim}}>{subs[page]}</div>
        </div>
        {page==="ac"&&sel&&(()=>{const a=FLEET.find(f=>f.reg===sel);return(
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:10,color:C.dim}}>MSN {a?.msn}</div>
            <div style={{fontSize:11,color:"#8899bb"}}>{a?.engine}</div>
          </div>
        );})()}
      </div>

      {/* SCROLL CONTENT */}
      <div style={{height:scrollH,overflowY:"auto",WebkitOverflowScrolling:"touch",flexShrink:0}}>
        {page==="home"  &&<AcGrid onSel={goAc}/>}
        {page==="ac"    &&sel&&<AcDetail reg={sel}/>}
        {page==="limits"&&<LimitsPage/>}
        {page==="tabs"  &&<TabsPage/>}
        {page==="sep"   &&<SepPage/>}
        {page==="ref"   &&<RefPage/>}
      </div>

      {/* FOOTER */}
      <div style={{height:FOOTER_H,display:"flex",alignItems:"center",justifyContent:"center",borderTop:`1px solid ${C.border2}`,flexShrink:0}}>
        <div style={{fontSize:9,color:C.vdim,letterSpacing:"0.08em"}}>NON-OFFICIAL · NOT FOR OPERATIONAL USE · V2.6 MAY 2026</div>
      </div>

      {/* BOTTOM NAV */}
      <div style={{height:NAV_H,backgroundColor:C.bg,borderTop:`1px solid ${C.border}`,display:"flex",flexShrink:0}}>
        <NavBtn icon="✈️" label="FLEET"  active={page==="home"||page==="ac"} onClick={goHome}/>
        <NavBtn icon="⚙️" label="LIMITS" active={page==="limits"} onClick={()=>setPage("limits")}/>
        <NavBtn icon="⚠️" label="TABS"   active={page==="tabs"}   onClick={()=>setPage("tabs")}/>
        <NavBtn icon="🆘" label="SEP"    active={page==="sep"}    onClick={()=>setPage("sep")}/>
        <NavBtn icon="📚" label="REF"    active={page==="ref"}    onClick={()=>setPage("ref")}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
